name: Deploy PSE 단어장 to GitHub Pages

# 사용하려면: 저장소 Settings → Pages → Source 를 "GitHub Actions" 로 변경.
# 그러면 main 에 푸시할 때마다 build.py 를 실행해 docs/ 를 배포합니다.
# (JSON 단어 파일만 고치고 푸시하면 bundle.js/manifest.json 은 CI가 만들어 줍니다.)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build data bundle
        run: python build.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
